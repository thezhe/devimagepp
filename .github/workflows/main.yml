# Publish `.devcontainer*` to ghcr.io
# See https://github.com/devcontainers/ci/blob/main/docs/github-action.md#getting-started

name: Main

on:
  schedule:
    - cron: '0 0 * * 0' # weekly
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4.1.1
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3.1.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push Dev Container task
        uses: devcontainers/ci@v0.3
        with:
          imageName: ghcr.io/${{ github.repository }} # TODO tag latest and branch

          noCache: true # TODO verify this pulls base

          refFilterForPush: 'refs/heads/master'
          eventFilterForPush: ''
